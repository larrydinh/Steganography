version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: stego_backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: stego_streamlit
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
