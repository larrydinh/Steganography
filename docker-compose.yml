version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: stego_backend
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_SOURCE_PREFIX: ${S3_SOURCE_PREFIX:-source/}
      S3_ENCODED_PREFIX: ${S3_ENCODED_PREFIX:-encoded/}
      S3_DECODED_PREFIX: ${S3_DECODED_PREFIX:-decoded/}
      S3_RETRIEVAL_PREFIX: ${S3_RETRIEVAL_PREFIX:-retrieval/}
      PRESIGNED_URL_EXPIRES: ${PRESIGNED_URL_EXPIRES:-3600}
      RETRIEVAL_CODE_TTL_HOURS: ${RETRIEVAL_CODE_TTL_HOURS:-24}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: stego_streamlit
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped